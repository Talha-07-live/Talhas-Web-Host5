<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Talha's Universal Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #player {
      position: absolute;
      width: 100% !important;
      height: 100% !important;
      background-color: #000;

    /* Buffer bar design */
    #bufferBarContainer {
      position: absolute;
      bottom: 50px;
      left: 5%;
      width: 90%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      overflow: hidden;
      z-index: 9999;
    }
    #bufferBar {
      height: 100%;
      width: 0%;
      background: limegreen;
      transition: width 0.3s linear;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="bufferBarContainer"><div id="bufferBar"></div></div>

  <script>
    jwplayer.key = "EP3tanOyfjurKgiA7KLnzMTekvDl1Wr14XmAOqNBk3eDc3Yyao+866DfCQaHUofh";

    const player = jwplayer("player").setup({
      playlist: [{
        title: "Talha's Stream",
        description: "Universal HLS/DASH Player",
        image: "https://s11.gifyu.com/images/S1l3T.jpg",
        sources: [
          { file: "https://backend.footfytv.live/proxy/direct?url=https%3A%2F%2Ft7.ultrastream.vip%2Fsporttv2%2Ftracks-v1a1%2Fmono.m3u8&Referer=https%3A%2F%2Ffoottime.top%2F", type: "hls", label: "HLS 1080p", default: true },
          { file: "https://example.com/video.mpd", type: "dash", label: "DASH 1080p" }
        ]
      }],
      width: "100%",
      height: "100%",
      controls: true,
      displaytitle: true,
      displaydescription: true,
      skin: { name: "netflix" },
      dvr: true, // DVR mode for live streams
      bufferlength: 30,
      hlsjsConfig: {
        liveSyncDuration: 20,     
        maxMaxBufferLength: 300,
        backBufferLength: 90,
        enableWorker: true,
        lowLatencyMode: false
      }
    });

    // Buffer bar update
    player.on("bufferChange", function(e) {
      document.getElementById("bufferBar").style.width = e.percent + "%";
    });

    // Add forward/backward buttons
    player.on("ready", function() {
      const container = player.getContainer();
      const buttonContainer = container.querySelector(".jw-button-container");
      const rewindBtn = buttonContainer.querySelector(".jw-icon-rewind");

      // Clone rewind for forward
      const forwardBtn = rewindBtn.cloneNode(true);
      forwardBtn.style.transform = "scaleX(-1)";
      forwardBtn.ariaLabel = "Forward 10 Seconds";
      rewindBtn.parentNode.insertBefore(forwardBtn, rewindBtn.nextElementSibling);

      // Click actions
      rewindBtn.onclick = () => player.seek(player.getPosition() - 10);
      forwardBtn.onclick = () => player.seek(player.getPosition() + 10);
    });
  </script>
</body>
</html>
